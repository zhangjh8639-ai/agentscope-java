server:
  port: ${CLAW_PORT:8080}

spring:
  application:
    name: agentscope-claw
  webflux:
    static-path-pattern: /**
  resources:
    static-locations:
      - classpath:/static/

# --------------------------------------------------------------------------
# agentscope-claw configuration
#
# All persistent state lives under ${claw.home} (default ~/.agentscope/claw),
# isolating claw from other harness apps (builder, dataagent, codingagent)
# that also live under ~/.agentscope/.
#
#   ${claw.home}/agentscope.json              — built-in agent definitions
#   ${claw.home}/agents.json                  — custom agent catalog
#   ${claw.home}/workspace/                   — main HarnessAgent workspace
#   ${claw.home}/agents/{agentId}/workspace/  — fallback per-agent workspace
#   ${claw.home}/agents/{agentId}/sessions.json — per-agent session store
# --------------------------------------------------------------------------
claw:
  home: ${CLAW_HOME:#{systemProperties['user.home']}/.agentscope/claw}

  # ---- DashScope model (used when no Model Spring bean is present) ----
  # Set DASHSCOPE_API_KEY env var or override api-key below.
  dashscope:
    api-key: ${DASHSCOPE_API_KEY:}
    model-name: ${CLAW_MODEL_NAME:qwen-max}
    stream: true

  # ---- Default built-in agent (used when auto-generating agentscope.json) ----
  agent:
    name: ${CLAW_AGENT_NAME:claw}
    sys-prompt: >
      You are a helpful local assistant. Answer accurately and concisely.

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    io.agentscope: INFO
