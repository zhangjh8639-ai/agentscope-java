{% if docs_versions is defined and docs_versions %}
<div class="version-switcher">
  <div class="version-selector" id="version-selector">
    <button
      class="version-button"
      type="button"
      onclick="return toggleVersionMenu()"
      aria-haspopup="listbox"
      aria-expanded="false"
      aria-label="Select documentation version"
    >
      <span id="current-version-label">{{ docs_version | default("latest") }}</span>
    </button>
    <div class="version-menu" id="version-menu" role="listbox">
      {% for v in docs_versions %}
        <a
          href="{{ v.url }}"
          class="version-option{% if v.current is defined and v.current %} active{% endif %}"
          role="option"
          aria-selected="{{ 'true' if v.current is defined and v.current else 'false' }}"
        >{{ v.label }}</a>
      {% endfor %}
    </div>
  </div>
</div>
{% endif %}
